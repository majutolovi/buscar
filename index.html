<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca de CEP por Endereço</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>📍 Buscar CEP</h2>
        <p>Preencha os campos abaixo para localizar o CEP:</p>
        
        <div class="form-group">
            <label for="uf">Estado (UF):</label>
            <input type="text" id="uf" placeholder="Ex: SP" maxlength="2">
        </div>

        <div class="form-group">
            <label for="cidade">Cidade:</label>
            <input type="text" id="cidade" placeholder="Ex: São Paulo">
        </div>

        <div class="form-group">
            <label for="rua">Rua/Avenida:</label>
            <input type="text" id="rua" placeholder="Ex: Paulista">
        </div>

        <button onclick="buscarCEP()">Pesquisar</button>

        <div id="resultado"></div>
    </div>

    <script src="main.js"></script>
</body>
</html>
